name: Tests E2E Selenium

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Installer les dépendances test
        run: pip install -r requirements-test.txt

      - name: Lancer Selenium (pytest)
        env:
          HB_TEST_BASE_URL: https://hbconsultingsrv-arch.github.io/hb-commerce/
          HB_TEST_PASSWORD: Test1234!
          HB_TEST_HEADLESS: "1"
        run: python tests/run_tests.py

      - name: Publier le rapport JSON sur main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/reports/latest.json
          git diff --staged --quiet || git commit -m "ci: rapport tests E2E Selenium"
          git push

      - name: Téléverser le rapport (artefact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: tests/reports/latest.json
