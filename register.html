<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription | HB Commerce</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <main class="auth-main container">
    <div class="auth-card auth-card-wide">
      <h1>Inscription professionnelle</h1>
      <form id="registerForm" class="auth-form">
        <label>E-mail <input type="email" name="email" required></label>
        <label>Mot de passe <input type="password" name="password" required minlength="6"></label>
        <label>Société <input type="text" name="company" required></label>
        <button type="submit" class="btn btn-primary">Créer le compte</button>
      </form>
    </div>
  </main>
</body>
</html>
